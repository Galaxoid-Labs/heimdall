# Builds the heimdall CLI for each platform + the framework tarball and attaches
# them to a GitHub Release. These are the assets install.sh / install.ps1 pull.
#
# Trigger: push a tag like `v0.1.0`  (git tag v0.1.0 && git push --tags)
name: release
on:
  push:
    tags: ["v*"] # the only trigger — push a v* tag to cut a release

permissions:
  contents: write # create the release + upload assets

jobs:
  # Each target is built NATIVELY on a matching-arch runner — Odin can't link
  # cross-compiled binaries, so there's no cross path. (Windows ARM64 is omitted:
  # `windows_arm64` isn't a supported Odin target.) The output is named directly
  # to the release-asset name — NOT `heimdall`, which would collide with the
  # `heimdall/` framework directory at the repo root.
  cli:
    name: cli (${{ matrix.asset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         asset: heimdall-darwin-arm64 }
          - { os: ubuntu-latest,    asset: heimdall-linux-x86_64 }
          - { os: ubuntu-24.04-arm, asset: heimdall-linux-arm64 }
          - { os: windows-latest,   asset: heimdall-windows-x86_64.exe }
    steps:
      - uses: actions/checkout@v7
      - name: Install Odin
        uses: laytan/setup-odin@v2
        with:
          release: dev-2026-06
      - name: Build CLI
        run: odin build cli -o:speed -out:${{ matrix.asset }}
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  framework:
    name: framework tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The framework is pure Odin source (plus the vendored Windows webview2
      # static lib, which lives inside heimdall/). Ship the framework dir + the
      # Claude Code skills (heimdall new copies these into scaffolded projects).
      - run: tar -czf heimdall-framework.tar.gz heimdall .claude/skills
      - uses: actions/upload-artifact@v7
        with:
          name: heimdall-framework.tar.gz
          path: heimdall-framework.tar.gz
          if-no-files-found: error

  release:
    name: publish release
    needs: [cli, framework]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true # flatten all artifacts into dist/
      - name: Checksums
        working-directory: dist
        run: |
          sha256sum heimdall-* > SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
